<div class="body padding" fxFlex fxLayout="column" fxLayoutAlign="center center" fxLayoutGap="20px" [formGroup]="form">
    <div fxLayout="column" fxLayoutGap="15px">
        <h1 class="mat-display-1">Changement de mot de passe</h1>

        <app-password [form]="form"></app-password>

        <!-- Spacer-->
        <div></div>

        <div fxLayout="row" fxLayoutAlign="center">
            <button (click)="submit()" [disabled]="sending || !form.valid" color="primary" mat-raised-button>
                <natural-icon name="save"></natural-icon>
                Valider le nouveau mot de passe
            </button>
        </div>
    </div>
</div>
